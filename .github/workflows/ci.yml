name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: lint-type-test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check src tests

      - name: Mypy
        run: python -m mypy src

      - name: Pytest
        run: python -m pytest
